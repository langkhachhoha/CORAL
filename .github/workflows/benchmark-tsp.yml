name: Benchmark — TSP

# "on" tells GitHub WHEN to run this workflow.
# workflow_dispatch = manual trigger from the Actions tab (with a "Run workflow" button).
# You can add `push:` or `schedule:` later if you want it to run automatically.
# Opt into Node.js 24 for JS-based actions now (they default to Node 20,
# which GitHub is deprecating — see
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      task_file:
        description: "Task YAML (relative to repo root)"
        default: "examples/tsp/task_1agent.yaml"
        type: string
      max_turns:
        description: "Max turns per agent (keep small to stay within the job timeout)"
        default: "100"
        type: string
      agents_count:
        description: "Number of parallel agents"
        default: "1"
        type: string
      sonnet_model:
        description: "OpenRouter model to route 'sonnet' traffic to"
        default: "minimax/minimax-m2.5"
        type: string

jobs:
  tsp:
    runs-on: ubuntu-latest
    # Keep the smoke-test short. Raise later when you want full runs.
    timeout-minutes: 3

    steps:
      # 1. Pull the repository code into the runner's workspace.
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install Python. CORAL targets 3.11+.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install `uv` (the package manager CORAL uses).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 4. Install CORAL and its dependencies into a local .venv.
      - name: Install CORAL
        run: uv sync --extra dev

      # 5. Install the Claude Code CLI.
      #    CORAL's `runtime: claude_code` spawns the `claude` binary as a subprocess,
      #    so the CLI must be on PATH. We install Node LTS + the npm package.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      # 6. Run the benchmark.
      #    - run.session=local: no tmux/docker (CI has no TTY).
      #    - agents.openrouter.*: route Claude Code traffic through OpenRouter.
      #    - The API key comes from the repo secret OPENROUTER_API_KEY (see README).
      - name: Run CORAL — TSP
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          uv run coral start \
            -c "${{ inputs.task_file }}" \
            run.session=local \
            run.verbose=true \
            agents.count=${{ inputs.agents_count }} \
            agents.max_turns=${{ inputs.max_turns }} \
            agents.openrouter.enabled=true \
            agents.openrouter.api_key="$OPENROUTER_API_KEY" \
            agents.openrouter.sonnet_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.opus_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.haiku_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.subagent_model="${{ inputs.sonnet_model }}"

      # 7. Dump the full shared state to the CI log — attempts, notes, skills,
      #    and the raw `.coral/public/` tree. This is the primary way to inspect
      #    results from a workflow run; dotfiles don't survive the artifact
      #    upload path so we lean on the job log instead.
      - name: Show run results (attempts, notes, skills, .coral tree)
        if: always()
        run: |
          set +e

          echo "=============================="
          echo " ATTEMPTS (leaderboard)"
          echo "=============================="
          uv run coral log
          echo

          echo "=============================="
          echo " NOTES"
          echo "=============================="
          uv run coral notes
          echo
          echo "--- Full note contents ---"
          i=1
          while :; do
            out=$(uv run coral notes --read "$i" 2>/dev/null)
            [ -z "$out" ] && break
            echo "--- Note #$i ---"
            echo "$out"
            echo
            i=$((i+1))
            [ "$i" -gt 100 ] && break
          done

          echo "=============================="
          echo " SKILLS"
          echo "=============================="
          uv run coral skills
          echo
          echo "--- Skill details ---"
          # Parse "  N. <name> — ..." lines from `coral skills` and dump each.
          uv run coral skills 2>/dev/null \
            | sed -nE 's/^[[:space:]]+[0-9]+\.[[:space:]]+([A-Za-z0-9_-]+).*/\1/p' \
            | while read -r name; do
                [ -z "$name" ] && continue
                echo "--- Skill: $name ---"
                uv run coral skills --read "$name"
                echo
              done

          echo "=============================="
          echo " .coral/public/ TREE"
          echo "=============================="
          # List every file under every run's .coral/public/ so you can see
          # attempts, notes, skills, checkpoints, logs at a glance.
          find results -path '*/.coral/public' -type d 2>/dev/null \
            | while read -r d; do
                echo "--- $d ---"
                ( cd "$d" && find . -maxdepth 6 -not -path './.git*' | sort )
                echo
              done

          echo "=============================="
          echo " NOTE & SKILL FILES (raw)"
          echo "=============================="
          # Dump every markdown file under notes/ and skills/ so nothing hides
          # if the coral CLI missed it for any reason.
          find results -path '*/.coral/public/notes/*' -name '*.md' 2>/dev/null \
            | sort | while read -r f; do
                echo "----- $f -----"
                cat "$f"
                echo
              done
          find results -path '*/.coral/public/skills/*/SKILL.md' 2>/dev/null \
            | sort | while read -r f; do
                echo "----- $f -----"
                cat "$f"
                echo
              done
