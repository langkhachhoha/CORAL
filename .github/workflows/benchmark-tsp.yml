name: Benchmark — TSP

# "on" tells GitHub WHEN to run this workflow.
# workflow_dispatch = manual trigger from the Actions tab (with a "Run workflow" button).
# You can add `push:` or `schedule:` later if you want it to run automatically.
# Opt into Node.js 24 for JS-based actions now (they default to Node 20,
# which GitHub is deprecating — see
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      task_file:
        description: "Task YAML (relative to repo root)"
        default: "examples/tsp/task_1agent.yaml"
        type: string
      max_turns:
        description: "Max turns per agent (keep small to stay within the job timeout)"
        default: "100"
        type: string
      agents_count:
        description: "Number of parallel agents"
        default: "1"
        type: string
      sonnet_model:
        description: "OpenRouter model to route 'sonnet' traffic to"
        default: "minimax/minimax-m2.5"
        type: string

jobs:
  tsp:
    runs-on: ubuntu-latest
    # Keep the smoke-test short. Raise later when you want full runs.
    timeout-minutes: 10

    steps:
      # 1. Pull the repository code into the runner's workspace.
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install Python. CORAL targets 3.11+.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install `uv` (the package manager CORAL uses).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 4. Install CORAL and its dependencies into a local .venv.
      - name: Install CORAL
        run: uv sync --extra dev

      # 5. Install the Claude Code CLI.
      #    CORAL's `runtime: claude_code` spawns the `claude` binary as a subprocess,
      #    so the CLI must be on PATH. We install Node LTS + the npm package.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      # 6. Run the benchmark.
      #    - run.session=local: no tmux/docker (CI has no TTY).
      #    - agents.openrouter.*: route Claude Code traffic through OpenRouter.
      #    - The API key comes from the repo secret OPENROUTER_API_KEY (see README).
      - name: Run CORAL — TSP
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          uv run coral start \
            -c "${{ inputs.task_file }}" \
            run.session=local \
            run.verbose=true \
            agents.count=${{ inputs.agents_count }} \
            agents.max_turns=${{ inputs.max_turns }} \
            agents.openrouter.enabled=true \
            agents.openrouter.api_key="$OPENROUTER_API_KEY" \
            agents.openrouter.sonnet_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.opus_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.haiku_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.subagent_model="${{ inputs.sonnet_model }}"

      # 7. Print a compact leaderboard so you can see the best score right in the log.
      - name: Show leaderboard
        if: always()
        run: uv run coral log || true

      # 7b. Show every note and every skill written during the run. For each
      #     one we print the name/header and the full body so you can inspect
      #     them directly from the job log (no artifact download needed).
      - name: Show notes and skills
        if: always()
        run: |
          set +e

          echo "=============================="
          echo " NOTES"
          echo "=============================="
          uv run coral notes
          echo
          i=1
          while :; do
            out=$(uv run coral notes --read "$i" 2>/dev/null)
            [ -z "$out" ] && break
            echo "----- Note #$i -----"
            echo "$out"
            echo
            i=$((i+1))
            [ "$i" -gt 100 ] && break
          done

          echo "=============================="
          echo " SKILLS"
          echo "=============================="
          uv run coral skills
          echo
          # Parse "  N. <name> — ..." from `coral skills` and dump each.
          uv run coral skills 2>/dev/null \
            | sed -nE 's/^[[:space:]]+[0-9]+\.[[:space:]]+([A-Za-z0-9_-]+).*/\1/p' \
            | while read -r name; do
                [ -z "$name" ] && continue
                echo "----- Skill: $name -----"
                uv run coral skills --read "$name"
                echo
              done

      # 8. Archive results, then upload the tarball.
      #
      #    Why tar instead of `path: results/` + `include-hidden-files: true`?
      #
      #    actions/upload-artifact@v4 packages files into a ZIP on the GitHub
      #    side. ZIP has two properties that bite us:
      #      (a) it does not preserve POSIX symlinks. The relative symlinks
      #          inside `agents/agent-N/.claude/{notes,skills,attempts,logs,
      #          heartbeat}` (which point at `../../../.coral/public/...`)
      #          get materialised as either empty files or duplicated copies
      #          on extract, breaking the `coral` tooling against the
      #          downloaded artifact.
      #      (b) `include-hidden-files: true` (added in upload-artifact 4.4)
      #          is honoured for the top-level glob, but several users have
      #          reported it silently drops nested dotfile trees that the
      #          underlying @actions/glob picks up. `.coral/`, `.claude/`,
      #          and `.shared/` are all hidden, deeply nested, and contain
      #          symlinks — the worst case for that path.
      #
      #    tar sidesteps both: it archives every file (hidden or not),
      #    preserves symlinks verbatim, and produces a single .tar.gz that
      #    upload-artifact stores as an opaque blob. Extracting it locally
      #    reproduces the exact run state — `coral log`, `coral ui`, etc.
      #    work against the extracted folder.
      - name: Archive results
        if: always()
        run: |
          if [ -d results ] && [ -n "$(ls -A results 2>/dev/null)" ]; then
            tar -czf results.tar.gz results/
            ls -lh results.tar.gz
            echo
            echo "Top-level entries inside the archive:"
            tar -tzf results.tar.gz | head -40
          else
            echo "::warning::No results directory to archive"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsp-results-${{ github.run_id }}
          path: results.tar.gz
          retention-days: 14
          if-no-files-found: warn
