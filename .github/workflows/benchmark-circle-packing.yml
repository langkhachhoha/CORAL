name: Benchmark — Circle Packing

# Smoke test for examples/math/circle_packing on a GitHub Actions runner.
# 1 agent, model = minimax/minimax-m2.5, research disabled.
# Manual trigger only — see README for how to launch from the Actions tab.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      task_file:
        description: "Task YAML (relative to repo root)"
        default: "examples/math/circle_packing/task_1agent.yaml"
        type: string
      max_turns:
        description: "Max turns per agent"
        default: "100"
        type: string
      sonnet_model:
        description: "OpenRouter model to route 'sonnet'/'opus'/'haiku' traffic to"
        default: "minimax/minimax-m2.5"
        type: string

jobs:
  circle_packing:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install CORAL
        run: uv sync --extra dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run CORAL — Circle Packing
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          uv run coral start \
            -c "${{ inputs.task_file }}" \
            run.session=local \
            run.verbose=true \
            agents.count=1 \
            agents.research=false \
            agents.max_turns=${{ inputs.max_turns }} \
            agents.openrouter.enabled=true \
            agents.openrouter.api_key="$OPENROUTER_API_KEY" \
            agents.openrouter.sonnet_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.opus_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.haiku_model="${{ inputs.sonnet_model }}" \
            agents.openrouter.subagent_model="${{ inputs.sonnet_model }}"

      - name: Show leaderboard
        if: always()
        run: uv run coral log || true

      - name: Show notes and skills
        if: always()
        run: |
          set +e
          echo "=============================="
          echo " NOTES"
          echo "=============================="
          uv run coral notes
          echo
          i=1
          while :; do
            out=$(uv run coral notes --read "$i" 2>/dev/null)
            [ -z "$out" ] && break
            echo "----- Note #$i -----"
            echo "$out"
            echo
            i=$((i+1))
            [ "$i" -gt 100 ] && break
          done
          echo "=============================="
          echo " SKILLS"
          echo "=============================="
          uv run coral skills
          echo
          uv run coral skills 2>/dev/null \
            | sed -nE 's/^[[:space:]]+[0-9]+\.[[:space:]]+([A-Za-z0-9_-]+).*/\1/p' \
            | while read -r name; do
                [ -z "$name" ] && continue
                echo "----- Skill: $name -----"
                uv run coral skills --read "$name"
                echo
              done

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: circle-packing-results-${{ github.run_id }}
          path: results/
          retention-days: 14
          if-no-files-found: warn
          include-hidden-files: true
