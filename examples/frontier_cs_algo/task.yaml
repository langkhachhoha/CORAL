task:
  name: "Frontier-CS Algorithmic"
  description: |
    Solve all 172 algorithmic optimization problems from the Frontier-CS benchmark.
    Each problem requires a C++17 solution that reads from stdin and writes to stdout.

    Problems are heuristic optimization tasks (packing, scheduling, graph problems, etc.)
    where solutions are scored on a continuous 0-100 scale based on solution quality,
    not just correctness. Higher scores mean better optimization.

    ## Workflow

    1. Read a problem statement from `problems/{id}/statement.txt`.
    2. Study the scoring formula, constraints, and example I/O.
    3. Write a C++17 solution and save it as `solutions/{id}.cpp`.
    4. Move on to the next problem. Prioritize breadth (solving many problems)
       over depth (perfecting one solution).
    5. Run `coral eval -m "solved problems X, Y, Z"` periodically to get your batch score.

    ## Solution format

    Each solution must be a self-contained C++17 file that:
    - Reads input from stdin
    - Writes output to stdout
    - Compiles with `g++ -std=c++17 -O2`
    - Runs within the per-problem time limit (typically 2-5 seconds)

    ## Problem directory structure

    Each problem in `problems/{id}/` contains:
    - `statement.txt` — full problem description with I/O format and scoring

    ## Strategy tips

    - Start with simpler heuristics (greedy, local search) then iterate.
    - Many problems reward simulated annealing, beam search, or genetic algorithms.
    - Check the scoring formula — some problems score relative to a baseline.
    - Share effective algorithmic patterns as notes for other agents.
  files:
    - "solutions/"
  seed:
    - "solutions/"
    - "problems/"
  tips: |
    - The grader evaluates ALL .cpp files in solutions/ in batch against the go-judge.
    - Your score is the average across ALL 172 problems — missing solutions count as 0.
    - Invalid or crashing solutions also score 0 for that problem.
    - Problem statements are in problems/{id}/statement.txt.
    - Breadth matters: solving many problems with decent scores beats perfecting a few.

grader:
  timeout: 3600
  direction: maximize
  args:
    judge_url: "http://localhost:8081"

agents:
  count: 1
  runtime: claude_code
  model: claude-opus-4-6
  max_turns: 200

workspace:
  results_dir: "./results"
  repo_path: "./examples/frontier_cs_algo/seed"

run:
  verbose: false
  ui: false
  tmux: true
