task:
  name: "Frontier-CS Research"
  description: |
    Solve the research track problems from the Frontier-CS benchmark.
    Each problem requires a Python solution implementing a `Solution` class with a `solve()` method.

    Problems span GPU kernel optimization (Triton), distributed systems, ML training,
    and security — real-world challenges scored on continuous 0-100 scales.

    ## Workflow

    1. Read a problem readme from `problems/{problem_id}/readme`.
       Some problems have variants in subdirectories (e.g., `problems/gemm_optimization/squares/readme`).
    2. Study the API specification, scoring formula, and constraints.
    3. Write a Python solution and save it as `solutions/{problem_id}/solution.py`.
       For variant problems, save as `solutions/{problem_id}/{variant}/solution.py`.
    4. Move on to the next problem. Prioritize breadth over depth.
    5. Run `coral eval -m "solved problems X, Y, Z"` periodically to get your batch score.

    ## Solution format

    Each solution must define a `Solution` class:
    ```python
    class Solution:
        def solve(self, spec_path: str = None) -> dict:
            # Return {"code": "your_code"} or {"program_path": "path/to/impl.py"}
            pass
    ```

    The exact API varies by problem — check each problem's readme for details.

    ## Problem categories

    - **HPC/GPU kernels** (flash_attn, cross_entropy, gemm_optimization, ...):
      Optimize Triton kernels for maximum speedup over baseline.
    - **Systems** (cant_be_late, nbody_simulation, ...):
      Design strategies or algorithms for systems challenges.
    - **ML** (imagenet_pareto, cloudcast, ...):
      Train models within parameter/compute budgets.
    - **Security** (poc_generation, grammar_fuzzing):
      Generate test cases or fuzzers for security challenges.
    - **Databases** (llm_sql, vdb_pareto):
      Optimize query performance or vector DB operations.

    ## Problem directory structure

    Each problem in `problems/{problem_id}/` contains:
    - `readme` — full problem spec, API, scoring formula

    ## Strategy tips

    - GPU kernel problems: study Triton programming, focus on memory access patterns and tiling.
    - Systems problems: understand the simulation model before coding.
    - ML problems: start with known architectures, then optimize within constraints.
    - Read evaluator.py to understand exactly how scoring works.
    - Share insights about problem-specific patterns as notes.
  files:
    - "solutions/"
  seed:
    - "solutions/"
    - "problems/"
  tips: |
    - The grader evaluates ALL solution.py files found in solutions/ in batch.
    - Your score is the average across ALL research problems — missing solutions count as 0.
    - Invalid or failing solutions also score 0.
    - Some problems require GPU (Docker with --gpus). The grader handles this automatically.
    - Research problems can take longer to evaluate (up to 10+ minutes each).
    - Focus on non-GPU problems first if GPU access is limited.
    - Problem readmes are in problems/{problem_id}/readme.
    - Breadth matters: solving many problems with decent scores beats perfecting a few.

grader:
  timeout: 7200
  direction: maximize
  args:
    problems_dir: "/path/to/frontier-cs-research-problems"

agents:
  count: 2
  runtime: claude_code
  model: claude-sonnet-4-6
  max_turns: 200
  research: true

workspace:
  results_dir: "./results"
  repo_path: "./examples/frontier_cs_research/seed"

run:
  verbose: false
  ui: false
  tmux: true
