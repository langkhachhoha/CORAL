task:
  name: tsp
  description: |
    Find the shortest round-trip tour through 100 cities. The coordinates
    are generated via random with a fixed seed in `solution.py`. DO NOT MODIFY the seed or CITIES generation!

    solution.py must print 100 integers (0-99) to stdout, one per line,
    representing the visit order. Each city must appear exactly once.

    The grader computes the total Euclidean round-trip distance
    and returns -distance as the score (shorter = higher).

grader:
  timeout: 60
  type: function
  module: eval.grader

agents:
  count: 1
  runtime: claude_code
  model: sonnet
  max_turns: 100
  research: false

  # Route Claude Code traffic to OpenRouter (e.g. to use cheaper minimax models).
  # Leave enabled: false to keep using the default Anthropic endpoint.
  openrouter:
    enabled: true
    # Load from local .env (gitignored) and pass via dotlist, e.g.
    #   set -a && source .env && set +a
    #   uv run coral start -c examples/tsp/task.yaml \
    #     agents.openrouter.api_key="$OPENROUTER_API_KEY"
    # In CI, set the OPENROUTER_API_KEY repo secret.
    api_key: ""
    base_url: "https://openrouter.ai/api"
    opus_model: "minimax/minimax-m2.5"
    sonnet_model: "minimax/minimax-m2.5"
    haiku_model: "minimax/minimax-m2.5"
    subagent_model: "minimax/minimax-m2.5"

workspace:
  results_dir: "./results"
  repo_path: "./examples/tsp/seed"
